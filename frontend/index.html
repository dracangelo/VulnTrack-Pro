<!-- frontend/index.html -->
<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>VulnTrack Pro — Dashboard</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
  <div class="container mx-auto p-6">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-3xl font-bold">VulnTrack Pro</h1>
      <button id="logoutBtn" class="px-3 py-2 bg-red-600 rounded">Logout</button>
    </div>

    <div class="grid grid-cols-3 gap-6">
      <div class="col-span-1 bg-gray-800 p-4 rounded">
        <h2 class="font-semibold mb-2">Add Target</h2>
        <form id="addTargetForm" class="space-y-2">
          <input id="targetName" placeholder="Name" class="w-full p-2 bg-gray-700 rounded" />
          <input id="targetIP" placeholder="IP or hostname" class="w-full p-2 bg-gray-700 rounded" />
          <button type="submit" class="px-3 py-2 bg-blue-600 rounded">Add</button>
        </form>
      </div>

      <div class="col-span-2 bg-gray-800 p-4 rounded">
        <h2 class="font-semibold mb-2">Targets</h2>
        <div id="targetList" class="space-y-2"></div>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
  <script>
    if (!localStorage.getItem("token")) {
      window.location.href = "/login";
    }
  </script>
</body>
</html>
