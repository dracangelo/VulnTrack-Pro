<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VaultBox - Targets</title>

  <!-- Tailwind via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

</head>
<body class="bg-gray-900 text-gray-200 min-h-screen">

  <div class="container mx-auto p-8">

    <h1 class="text-3xl font-bold mb-6">VaultBox - Target Manager</h1>

    <!-- Create Target Form -->
    <div class="bg-gray-800 p-6 rounded-lg shadow mb-8">
      <h2 class="text-xl font-semibold mb-4">Add New Target</h2>

      <form id="addTargetForm" class="space-y-4">
        <input
          type="text"
          id="targetName"
          placeholder="Target Name"
          class="w-full p-3 rounded bg-gray-700 text-gray-200"
        >
        <input
          type="text"
          id="targetIP"
          placeholder="Target IP (e.g. 192.168.0.10)"
          class="w-full p-3 rounded bg-gray-700 text-gray-200"
        >

        <button
          type="submit"
          class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded shadow font-semibold"
        >
          Add Target
        </button>
      </form>
    </div>

    <!-- Target List -->
    <div class="bg-gray-800 p-6 rounded-lg shadow">
      <h2 class="text-xl font-semibold mb-4">Existing Targets</h2>

      <div id="targetList" class="space-y-3"></div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
