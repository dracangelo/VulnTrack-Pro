<!-- frontend/login.html -->
<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Login — VulnTrack Pro</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
  <div class="flex items-center justify-center h-screen">
    <div class="bg-gray-800 p-8 rounded w-full max-w-md">
      <h1 class="text-2xl mb-4 font-bold">VulnTrack Pro</h1>

      <form id="loginForm" class="space-y-4">
        <input id="username" placeholder="Username" class="w-full p-2 bg-gray-700 rounded" required />
        <input id="password" placeholder="Password" type="password" class="w-full p-2 bg-gray-700 rounded" required />
        <button type="submit" class="w-full py-2 bg-blue-600 rounded">Login</button>
      </form>

      <p id="message" class="mt-3 text-sm text-red-400"></p>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
